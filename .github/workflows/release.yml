name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.6.2'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    container:
      image: almalinux:8

    steps:
    - name: Install dependencies
      run: |
        dnf install -y epel-release
        dnf config-manager --set-enabled powertools
        dnf install -y \
          cmake \
          file \
          fontconfig-devel \
          freetype-devel \
          gcc-toolset-13-gcc-c++ \
          git \
          libX11-devel \
          libXi-devel \
          libXrender-devel \
          libicu-devel \
          librsvg2-tools \
          libxcb-devel \
          libxkbcommon-devel \
          libxkbcommon-x11-devel \
          mesa-libGL-devel \
          mesa-libGLU-devel \
          ninja-build \
          patchelf \
          python39 \
          python39-pip \
          squashfs-tools \
          wget \
          which \
          xcb-util-cursor-devel \
          xcb-util-devel \
          xcb-util-image-devel \
          xcb-util-keysyms-devel \
          xcb-util-renderutil-devel \
          xcb-util-wm-devel
        git config --global --add safe.directory '*'

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt
      run: |
        pip3.9 install aqtinstall py7zr
        aqt install-qt linux desktop ${{ env.QT_VERSION }} gcc_64 \
          -m qt5compat -O /opt/qt

    - name: Generate PNG icon
      run: rsvg-convert -w 256 -h 256 resource/qsoc.svg -o resource/qsoc.png

    - name: Configure CMake
      run: |
        source /opt/rh/gcc-toolset-13/enable
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DCMAKE_PREFIX_PATH=/opt/qt/${{ env.QT_VERSION }}/gcc_64 \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_DOXYGEN=OFF \
          -DENABLE_UNIT_TEST=OFF

    - name: Build
      run: |
        source /opt/rh/gcc-toolset-13/enable
        cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Install to AppDir
      run: |
        DESTDIR=$(pwd)/AppDir cmake --install build
        rm -rf AppDir/usr/include

    - name: Bundle libstdc++ and libgcc
      run: |
        source /opt/rh/gcc-toolset-13/enable
        mkdir -p AppDir/usr/lib
        cp -L "$(gcc -print-file-name=libstdc++.so.6)" AppDir/usr/lib/
        cp -L "$(gcc -print-file-name=libgcc_s.so.1)" AppDir/usr/lib/

    - name: Download packaging tools
      env:
        APPIMAGE_EXTRACT_AND_RUN: "1"
      run: |
        wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
        wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
        wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
        wget -q "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64"
        chmod +x linuxdeploy*.AppImage appimagetool*.AppImage

    - name: Build AppImage
      env:
        APPIMAGE_EXTRACT_AND_RUN: "1"
      run: |
        export QMAKE=/opt/qt/${{ env.QT_VERSION }}/gcc_64/bin/qmake
        export LD_LIBRARY_PATH=/opt/qt/${{ env.QT_VERSION }}/gcc_64/lib:${LD_LIBRARY_PATH}
        export EXTRA_QT_PLUGINS="svg"
        export VERSION="${{ github.ref_name }}"
        export LDAI_RUNTIME_FILE="$(pwd)/runtime-x86_64"
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --desktop-file AppDir/usr/share/applications/qsoc.desktop \
          --icon-file resource/qsoc.png \
          --plugin qt
        find AppDir/usr/lib -type f -name '*.so*' \
          -exec patchelf --set-rpath '$ORIGIN' --force-rpath {} \; 2>/dev/null || true
        patchelf --set-rpath '$ORIGIN/../lib' --force-rpath AppDir/usr/bin/qsoc
        ./appimagetool-x86_64.AppImage \
          --runtime-file runtime-x86_64 \
          AppDir "QSoC-${VERSION}-x86_64.AppImage"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-appimage
        path: QSoC-*-x86_64.AppImage

  build-windows:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        modules: 'qt5compat'
        cache: 'true'
        cache-key-prefix: 'install-qt-action-windows'

    - name: Install tools
      run: choco install ninja pkgconfiglite -y

    - name: Configure CMake
      run: >-
        cmake -B build -G Ninja
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DSLANG_USE_MIMALLOC=OFF
        -DENABLE_CLANG_TIDY=OFF
        -DENABLE_DOXYGEN=OFF
        -DENABLE_UNIT_TEST=OFF

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Deploy
      run: |
        mkdir deploy
        copy build\qsoc.exe deploy\
        windeployqt deploy\qsoc.exe --release --no-translations --no-system-d3d-compiler --no-opengl-sw
        # Bundle Qt modules that windeployqt may miss
        $qtBin = "$env:QT_ROOT_DIR\bin"
        foreach ($dll in @(
          "Qt6Core5Compat.dll"
        )) {
          if (Test-Path "$qtBin\$dll") {
            copy "$qtBin\$dll" deploy\
          }
        }
        Remove-Item deploy\*.pdb -ErrorAction SilentlyContinue

    - name: Verify deployment
      run: |
        cd deploy
        .\qsoc.exe -v
        if ($LASTEXITCODE -ne 0) { throw "qsoc.exe failed with exit code $LASTEXITCODE" }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: deploy/

  build-macos:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'
        modules: 'qt5compat'
        cache: 'true'
        cache-key-prefix: 'install-qt-action-macos'

    - name: Install tools
      run: brew install ninja pkg-config

    - name: Configure CMake
      run: >-
        cmake -B build -G Ninja
        -DCMAKE_POLICY_VERSION_MINIMUM=3.5
        -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
        -DSLANG_USE_MIMALLOC=OFF
        -DENABLE_CLANG_TIDY=OFF
        -DENABLE_DOXYGEN=OFF
        -DENABLE_UNIT_TEST=OFF

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Deploy
      run: |
        mkdir deploy
        cp -a build/qsoc.app deploy/QSoC.app
        macdeployqt deploy/QSoC.app -verbose=1

    - name: Verify deployment
      run: |
        deploy/QSoC.app/Contents/MacOS/qsoc -v

    - name: Create DMG
      run: |
        set -euo pipefail
        DMG_FINAL="QSoC-${{ github.ref_name }}-macos-arm64.dmg"
        DMG_RW="$(mktemp -u).dmg"
        DMG_SIZE_MB=$(( $(du -sm deploy | awk '{print $1}') + 50 ))
        hdiutil create -size "${DMG_SIZE_MB}m" -fs HFS+ -volname "QSoC" "$DMG_RW"
        MOUNT_DIR="$(mktemp -d)"
        DEVICE=$(hdiutil attach -nobrowse -noverify -mountpoint "$MOUNT_DIR" "$DMG_RW" \
                 | awk 'NR==1{print $1}')
        ditto deploy "$MOUNT_DIR"
        sync
        hdiutil detach "$DEVICE"
        hdiutil convert "$DMG_RW" -format UDZO -o "$DMG_FINAL"
        rm -f "$DMG_RW"
        ls -la "$DMG_FINAL"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: QSoC-*.dmg

  build-docs:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Nix
      uses: cachix/install-nix-action@v30
      with:
        extra_nix_config: |
          experimental-features = nix-command flakes
          accept-flake-config = true

    - name: Cache Nix store
      uses: nix-community/cache-nix-action@v6
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('doc/flake.lock', 'doc/flake.nix') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 5G
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-last-accessed: 0
        purge-primary-key: never

    - name: Build documentation PDF
      run: nix build ./doc#qsoc-manual --print-build-logs

    - name: Collect PDF
      run: |
        mkdir -p doc-pdf
        cp -L result/*.pdf doc-pdf/
        ls -la doc-pdf/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: docs-pdf
        path: doc-pdf/*.pdf

  release:
    needs: [build-linux, build-windows, build-macos, build-docs]
    runs-on: ubuntu-22.04

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Package Windows build
      run: |
        cd windows-exe
        7z a ../QSoC-${{ github.ref_name }}-windows-x64.zip ./*

    - name: List release files
      run: |
        ls -la linux-appimage/
        ls -la QSoC-*-windows-x64.zip
        ls -la macos-dmg/
        ls -la docs-pdf/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          linux-appimage/QSoC-*-x86_64.AppImage
          QSoC-*-windows-x64.zip
          macos-dmg/QSoC-*-macos-arm64.dmg
          docs-pdf/*.pdf
        body: |
          **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
